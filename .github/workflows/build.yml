name: Auto Build F-wrt x86 (Ubuntu 24.04)

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *' # 每天北京时间 04:00 运行

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup Space & Initialization
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 1. 强力清理不必要的软件包以腾出空间 (针对 Azure/GitHub Runner)
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/lib/jvm
        sudo -E apt-get -qq purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* sbt* mono-devel*
        
        # 2. 更新并安装依赖 (使用 ophub 的最新 24.04 脚本)
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://ophub.org/ubuntu2404-make-openwrt-depends)
        
        # 3. 深度清理
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        
        # 检查剩余空间
        echo "----------------------------"
        echo "Remaining space after cleanup:"
        df -h
        echo "----------------------------"

    - name: Clone source code
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    # 缓存机制 (由于空间充裕，建议保留)
    - name: Cache OpenWrt Build
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/staging_dir
        key: ${{ runner.os }}-openwrt-${{ hashFiles('openwrt/feeds.conf.default') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-

    - name: Load custom feeds
      run: |
        cd openwrt
        chmod +x ../diy-part1.sh
        ../diy-part1.sh
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e .config ] && mv .config openwrt/.config
        cd openwrt
        chmod +x ../diy-part2.sh
        ../diy-part2.sh
        make defconfig

    - name: Download package
      run: cd openwrt && make download -j$(nproc)

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "STRAP_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: Cleanup Old Caches
      uses: actions/github-script@v7
      with:
        script: |
          const caches = await github.rest.actions.getActionsCacheList({
            owner: context.repo.owner,
            repo: context.repo.repo,
          })
          for (const cache of caches.data.actions_caches) {
            console.log(`Deleting old cache: ${cache.key}`)
            await github.rest.actions.deleteActionsCacheById({
              owner: context.repo.owner,
              repo: context.repo.repo,
              cache_id: cache.id,
            })
          }

    - name: Organize files
      run: |
        cd openwrt/bin/targets/x86/64
        rm -rf packages
        for file in *.img.gz; do
          mv "$file" "F-wrt-${{ env.STRAP_DATE }}-${file}"
        done
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Upload firmware to Release
      uses: softprops/action-gh-release@v2
      if: env.FIRMWARE != ''
      with:
        tag_name: F-wrt_${{ env.STRAP_DATE }}
        name: F-wrt 自动编译发布 - ${{ env.STRAP_DATE }}
        files: ${{ env.FIRMWARE }}/F-wrt-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
