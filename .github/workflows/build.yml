name: Auto Build F-wrt x86 (Optimized v3)

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *' # 每天北京时间 04:00 运行

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup Space & Initialization
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 1. 深度清理 Azure 环境，腾出约 40GB 空间
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/lib/jvm
        sudo -E apt-get -qq purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* sbt* mono-devel*
        
        # 2. 安装 Ubuntu 24.04 编译依赖
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://ophub.org/ubuntu2404-make-openwrt-depends)
        
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    # --- 核心提速：智能缓存 ---
    - name: Cache OpenWrt Build
      id: cache
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/staging_dir
          openwrt/build_dir/host
        # 增加 v3 版本号，强制刷新之前那个“空循环”产生的脏缓存
        key: ${{ runner.os }}-openwrt-v3-${{ hashFiles('openwrt/feeds.conf.default') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-v3-

    - name: Load custom feeds
      run: |
        cd openwrt
        chmod +x ../diy-part1.sh
        ../diy-part1.sh
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e .config ] && mv .config openwrt/.config
        cd openwrt
        chmod +x ../diy-part2.sh
        ../diy-part2.sh
        # 确保配置生效
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j$(nproc)
        # 检查是否有没有下载成功的包，强制重试
        find dl -size -1k -exec ls -l {} \;
        find dl -size -1k -exec rm -f {} \;
        make download -j$(nproc)

    - name: Compile the firmware
      run: |
        cd openwrt
        # 优先多线程，失败后最多尝试两次，避免死循环在单线程里
        make -j$(nproc) || make -j$(nproc) || make -j1 V=s
        echo "STRAP_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    # --- 核心改进：智能清理旧缓存，保留当前有用的 ---
    - name: Cleanup Old Caches
      uses: actions/github-script@v7
      with:
        script: |
          const caches = await github.rest.actions.getActionsCacheList({
            owner: context.repo.owner,
            repo: context.repo.repo,
          })
          const currentKey = `${process.env.RUNNER_OS}-openwrt-v3-${{ hashFiles('openwrt/feeds.conf.default') }}`
          for (const cache of caches.data.actions_caches) {
            if (cache.key !== currentKey) {
              console.log(`Deleting old/stale cache: ${cache.key}`)
              await github.rest.actions.deleteActionsCacheById({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id,
              })
            }
          }

    - name: Organize files
      run: |
        cd openwrt/bin/targets/x86/64
        rm -rf packages
        for file in *.img.gz; do
          mv "$file" "F-wrt-${{ env.STRAP_DATE }}-${file}"
        done
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Upload firmware to Release
      uses: softprops/action-gh-release@v2
      if: env.FIRMWARE != ''
      with:
        tag_name: F-wrt_${{ env.STRAP_DATE }}
        name: F-wrt 自动编译发布 - ${{ env.STRAP_DATE }}
        files: ${{ env.FIRMWARE }}/F-wrt-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete older releases
      uses: dev-drpradheep/delete-older-releases@v0.3.3
      with:
        keep_latest: 2  # 只保留最近的 2 个版本，其余全部删除
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete workflow runs
      uses: Mattraider/delete-workflow-runs@v2
      with:
        retain_days: 1
        keep_minimum_runs: 3
