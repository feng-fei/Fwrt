name: Auto Build F-wrt x86 (Optimized v3)

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *' # 每天北京时间 04:00 运行

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04 # 建议使用 22.04 以获得更好的源码兼容性
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup Space & Initialization
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/lib/jvm
        sudo -E apt-get -qq purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* sbt* mono-devel*
        sudo -E apt-get -qq update
        # 自动获取对应版本的编译依赖
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Cache OpenWrt Build
      id: cache
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/staging_dir
          openwrt/build_dir/host
        key: ${{ runner.os }}-openwrt-v3-${{ hashFiles('openwrt/feeds.conf.default') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-v3-

    - name: Load custom feeds
      run: |
        cd openwrt
        chmod +x ../diy-part1.sh
        ../diy-part1.sh
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e .config ] && mv .config openwrt/.config
        cd openwrt
        chmod +x ../diy-part2.sh
        ../diy-part2.sh
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j$(nproc)
        find dl -size -1k -exec ls -l {} \;
        find dl -size -1k -exec rm -f {} \;
        make download -j$(nproc)

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "STRAP_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: Cleanup Old Caches
      uses: actions/github-script@v7
      with:
        script: |
          const caches = await github.rest.actions.getActionsCacheList({
            owner: context.repo.owner,
            repo: context.repo.repo,
          })
          const currentKey = `${process.env.RUNNER_OS}-openwrt-v3-${{ hashFiles('openwrt/feeds.conf.default') }}`
          for (const cache of caches.data.actions_caches) {
            if (cache.key !== currentKey) {
              await github.rest.actions.deleteActionsCacheById({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id,
              })
            }
          }

    - name: Organize files
      run: |
        cd openwrt/bin/targets/x86/64
        rm -rf packages
        for file in *.img.gz; do
          mv "$file" "F-wrt-${{ env.STRAP_DATE }}-${file}"
        done
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Upload firmware to Release
      uses: softprops/action-gh-release@v2
      if: env.FIRMWARE != ''
      with:
        tag_name: F-wrt_${{ env.STRAP_DATE }}
        name: F-wrt 自动编译发布 - ${{ env.STRAP_DATE }}
        files: ${{ env.FIRMWARE }}/F-wrt-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete older releases
      uses: dev-drprasad/delete-older-releases@v0.3.3
      with:
        keep_latest: 2
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 1
        keep_minimum_runs: 3
