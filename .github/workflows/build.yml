name: Auto Build F-wrt x86

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *' # 每天北京时间 04:00 运行

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    # 核心：必须声明权限，否则无法上传 Release 和清理缓存
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    # 开启缓存 (加速编译)
    - name: Cache OpenWrt Build
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/staging_dir
        key: ${{ runner.os }}-openwrt-${{ hashFiles('openwrt/feeds.conf.default') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-

    - name: Load custom feeds
      run: |
        cd openwrt
        chmod +x ../diy-part1.sh
        ../diy-part1.sh
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e .config ] && mv .config openwrt/.config
        cd openwrt
        chmod +x ../diy-part2.sh
        ../diy-part2.sh
        make defconfig

    - name: Download package
      run: cd openwrt && make download -j$(nproc)

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "STRAP_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    # 替换为更稳定的缓存清理方案
    - name: Cleanup Old Caches
      uses: actions/github-script@v7
      with:
        script: |
          const caches = await github.rest.actions.getActionsCacheList({
            owner: context.repo.owner,
            repo: context.repo.repo,
          })
          for (const cache of caches.data.actions_caches) {
            if (cache.key !== `${process.env.RUNNER_OS}-openwrt-${process.env.FEEDS_HASH}`) {
              console.log(`Deleting old cache: ${cache.key}`)
              await github.rest.actions.deleteActionsCacheById({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id,
              })
            }
          }

    - name: Organize files
      run: |
        cd openwrt/bin/targets/x86/64
        rm -rf packages
        for file in *.img.gz; do
          mv "$file" "F-wrt-${{ env.STRAP_DATE }}-${file}"
        done
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Upload firmware to Release
      uses: softprops/action-gh-release@v2  # 升级到 v2 更好的支持 Node 环境
      if: env.FIRMWARE != ''
      with:
        tag_name: F-wrt_${{ env.STRAP_DATE }}
        name: F-wrt 自动编译发布 - ${{ env.STRAP_DATE }}
        files: ${{ env.FIRMWARE }}/F-wrt-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
